# Career-Ops Careers Portal Registry
# Used by modes/scan.md for automated job board scraping.
# Add your own company entries below.

portals:
  # ─── FAANG / Big Tech ───────────────────────────────────────────────────────
  - company: Google
    url: "https://careers.google.com/jobs/results/"
    search_params: "?q=software+engineer&location=United+States&employment_type=FULL_TIME"
    selector: ".gc-card"
    title_selector: ".gc-card__title"
    pagination: next_button
    notes: "Filter by 'Software Engineering' family"

  - company: Microsoft
    url: "https://jobs.microsoft.com/us/en/search"
    search_params: "?q=software+engineer&lc=United+States"
    selector: "[data-automation-id='jobResult']"
    title_selector: ".ms-Link"
    pagination: infinite_scroll
    notes: "Filter via category=Engineering"

  - company: Amazon
    url: "https://www.amazon.jobs/en/search"
    search_params: "?base_query=software+engineer&loc_query=United+States"
    selector: ".job-tile"
    title_selector: ".job-title"
    pagination: next_button
    notes: "Amazon and AWS roles combined"

  - company: Meta
    url: "https://www.metacareers.com/jobs"
    search_params: "/?q=software+engineer&divisions[0]=Engineering"
    selector: "[data-testid='job-listing']"
    title_selector: "a[data-testid='job-title']"
    pagination: load_more
    notes: "Covers Facebook, Instagram, WhatsApp, Reality Labs"

  - company: Apple
    url: "https://jobs.apple.com/en-us/search"
    search_params: "?search=software+engineer&sort=newest"
    selector: ".table--advanced-search__title"
    title_selector: "a"
    pagination: next_button
    notes: "Filter by 'Software and Services' team"

  # ─── AI / ML Companies ──────────────────────────────────────────────────────
  - company: Anthropic
    url: "https://www.anthropic.com/careers"
    selector: ".career-listing"
    title_selector: "h3"
    pagination: none
    notes: "Check Engineering section"

  - company: OpenAI
